<!DOCTYPE html>
<html>
<head>
  <title>Sensrs Resource Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1120;
      color: white;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 60px 20px 30px;
    }

    .hero h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #94a3b8;
    }

    /* GRID */
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 30px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      transition: 0.3s;
      text-align: center;
    }

    .card:hover {
      transform: translateY(-5px);
      background: #334155;
    }

    .card h3 {
      margin-bottom: 10px;
    }

    .card a {
      color: #38bdf8;
      text-decoration: none;
      font-weight: bold;
    }

    /* FOOTER */
    .footer {
      text-align: center;
      padding: 20px;
      color: #64748b;
      margin-top: 20px;
    }

  </style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>Sensrs Resource Hub</h1>
  <p>All important links and opportunities in one place</p>
</div>

<!-- CARDS -->
<div class="container">

  <div class="card">
    <h3>Outreach</h3>
    <a href="https://sensrs.com/outreach" target="_blank">Explore →</a>
  </div>

  <div class="card">
    <h3>Photo Gallery</h3>
    <a href="https://sensrs.com/photo-gallery" target="_blank">View →</a>
  </div>

  <div class="card">
    <h3>Video Gallery</h3>
    <a href="https://sensrs.com/video-gallery" target="_blank">Watch →</a>
  </div>

  <div class="card">
    <h3>Press & News</h3>
    <a href="https://sensrs.com/press-and-news" target="_blank">Read →</a>
  </div>

  <div class="card">
    <h3>Newsletter</h3>
    <a href="https://sensrs.com/newsletter" target="_blank">Open →</a>
  </div>

  <div class="card">
    <h3>Publications</h3>
    <a href="https://sensrs.com/publications" target="_blank">View →</a>
  </div>

  <div class="card">
    <h3>Internships</h3>
    <a href="https://sensrs.com/internship" target="_blank">Apply →</a>
  </div>

  <div class="card">
    <h3>PhD Programme</h3>
    <a href="https://sensrs.com/phd-programme" target="_blank">Learn More →</a>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  © Sensrs Resource Hub
</div>

</body>
</html>
